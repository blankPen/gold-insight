<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金实时价格 - XAUUSD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555566;
            --accent-gold: #d4af37;
            --accent-gold-light: #f0d875;
            --price-up: #00d084;
            --price-down: #ff4757;
            --border-color: #2a2a3a;
            --glow-gold: rgba(212, 175, 55, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 2rem 0;
            position: relative;
        }

        .header-sse-status {
            position: absolute;
            top: 0;
            right: 0;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.85rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-secondary);
            z-index: 2;
        }

        .header-sse-status .status-value {
            font-size: 0.72rem;
            margin: 0;
        }

        @media (max-width: 520px) {
            .header-sse-status {
                font-size: 0.65rem;
                padding: 0.3rem 0.55rem;
            }
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--bg-primary);
            font-size: 1.25rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .last-update {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .page-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 1200px) {
            .page-layout {
                grid-template-columns: 1fr 340px;
            }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 2fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
        }

        .card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-gold);
            border-radius: 2px;
        }

        .price-display {
            text-align: center;
            padding: 1rem 0;
        }

        .price-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        /* 与 K 线/ETF 一致：涨红跌绿 */
        .price-value.up {
            color: var(--price-down);
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
        }

        .price-value.down {
            color: var(--price-up);
            text-shadow: 0 0 30px rgba(0, 208, 132, 0.3);
        }

        .price-value.neutral {
            color: var(--text-primary);
        }

        .price-currency {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-left: 0.25rem;
        }

        .price-changes {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 0.65rem 1rem;
            margin-top: 2rem;
            width: 100%;
        }

        .price-change-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 0.35rem;
            padding: 0.45rem 0.9rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all 0.3s ease;
            flex: 1 1 8.5rem;
            min-width: min(100%, 8.5rem);
            max-width: 14rem;
        }

        .price-change-row .chg-label {
            color: var(--text-secondary);
            font-size: 0.72rem;
            text-align: center;
            font-weight: 500;
            width: 100%;
        }

        .price-change-row .chg-values {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.35rem;
            text-align: center;
        }

        .price-change-row.up {
            background: rgba(255, 71, 87, 0.1);
            color: var(--price-down);
        }

        .price-change-row.down {
            background: rgba(0, 208, 132, 0.1);
            color: var(--price-up);
        }

        .price-change-row.neutral {
            background: rgba(136, 136, 160, 0.1);
            color: var(--text-secondary);
        }

        .chart-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            align-items: center;
        }

        .chart-toolbar button {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 0.35rem 0.65rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chart-toolbar button:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold-light);
        }

        .chart-toolbar button.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--accent-gold);
            color: var(--accent-gold-light);
        }

        .insight-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .insight-metric {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.65rem 0.75rem;
        }

        .insight-metric .k {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .insight-metric .v {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: var(--accent-gold-light);
            margin-top: 0.2rem;
        }

        .insight-contract-tag {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.35rem;
        }

        .macro-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media (min-width: 900px) {
            .macro-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .macro-chart-wrap {
            position: relative;
            height: 220px;
            width: 100%;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .chart-container .chart-loading-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            height: auto;
            min-height: 0;
            margin: 0;
            background: rgba(10, 10, 15, 0.55);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        @media (min-width: 768px) {
            .chart-container {
                height: 350px;
            }
        }

        .status-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .status-value.connected {
            color: var(--price-up);
        }

        .status-value.disconnected {
            color: var(--price-down);
        }

        .status-value.connecting {
            color: #ffa502;
        }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }

        .pulse.connected {
            background: var(--price-up);
            box-shadow: 0 0 10px var(--price-up);
        }

        .pulse.disconnected {
            background: var(--price-down);
            box-shadow: 0 0 10px var(--price-down);
            animation: none;
        }

        .pulse.connecting {
            background: #ffa502;
            box-shadow: 0 0 10px #ffa502;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: var(--price-down);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .today-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .today-stat {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            min-width: 0;
        }

        .today-stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .today-stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .today-stat-val.up {
            color: var(--price-down);
        }

        .today-stat-val.down {
            color: var(--price-up);
        }

        .today-stat-val.neutral {
            color: var(--text-primary);
        }

        .ai-panel {
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 200px);
        }

        .ai-panel .card {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .ai-panel .card:hover {
            transform: none;
        }

        .ai-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .ai-panel-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .ai-log-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .ai-log-list::-webkit-scrollbar {
            width: 4px;
        }

        .ai-log-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .ai-log-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        .ai-log-item {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 0.625rem;
            background: var(--bg-secondary);
            transition: background 0.2s ease;
        }

        .ai-log-item:hover {
            background: var(--bg-card-hover);
        }

        .ai-log-item.new-item {
            animation: fadeSlideIn 0.4s ease;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-log-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.375rem;
            flex-wrap: wrap;
        }

        .ai-log-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .ai-log-level {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
        }

        .ai-log-level.critical {
            background: rgba(255, 71, 87, 0.15);
            color: var(--price-down);
        }

        .ai-log-level.warning {
            background: rgba(255, 165, 2, 0.15);
            color: #ffa502;
        }

        .ai-log-level.info {
            background: rgba(0, 208, 132, 0.1);
            color: var(--price-up);
        }

        .ai-log-type-tag {
            font-size: 0.55rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
        }

        .ai-log-type-tag.periodic {
            background: rgba(100, 120, 220, 0.15);
            color: #7b93db;
        }

        .ai-log-type-tag.alert {
            background: rgba(255, 165, 2, 0.12);
            color: #ffa502;
        }

        .ai-log-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            line-height: 1.3;
        }

        .ai-log-price {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-gold);
            margin-bottom: 0.375rem;
        }

        .ai-log-analysis {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 0.25rem;
        }

        .ai-log-suggestion {
            font-size: 0.7rem;
            color: var(--accent-gold-light);
            padding: 0.3rem 0.5rem;
            background: rgba(212, 175, 55, 0.08);
            border-radius: 4px;
            margin-top: 0.375rem;
        }

        .ai-log-confidence {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.6rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
        }

        .confidence-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .confidence-dot.high { background: var(--price-up); }
        .confidence-dot.medium { background: #ffa502; }
        .confidence-dot.low { background: var(--price-down); }

        .ai-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .ai-empty-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-sse-status" title="实时行情推送连接">
                <span class="status-value connecting" id="connectionStatus">
                    <span class="pulse connecting"></span>连接中...
                </span>
            </div>
            <div class="logo">
                <div class="logo-icon">Au</div>
                <h1>黄金实时价格</h1>
            </div>
            <div class="subtitle">XAUUSD · 现货黄金</div>
            <div class="last-update">
                最后更新: <span id="updateTime">--:--:--</span>
            </div>
        </header>

        <div class="page-layout">
          <div class="main-content">
            <div class="grid">
            <div class="card price-card">
                <div class="card-title">当前价格</div>
                <div class="price-display">
                    <div class="price-value neutral" id="priceValue">
                        --<span class="price-currency">USD</span>
                    </div>
                    <div class="price-changes">
                        <div class="price-change-row neutral" id="changeDayRow">
                            <span class="chg-label">今日涨幅</span>
                            <span class="chg-values">
                                <span id="changeDayAmount">—</span>
                                <span id="changeDayPercent">—</span>
                            </span>
                        </div>
                        <div class="price-change-row neutral" id="change1hRow">
                            <span class="chg-label">1h 涨幅</span>
                            <span class="chg-values">
                                <span id="change1hAmount">—</span>
                                <span id="change1hPercent">—</span>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="today-stats" aria-label="今日价幅">
                    <div class="today-stat">
                        <span class="today-stat-label">今日开盘</span>
                        <span class="today-stat-val neutral" id="todayOpen">—</span>
                    </div>
                    <div class="today-stat">
                        <span class="today-stat-label">今日最高</span>
                        <span class="today-stat-val neutral" id="todayHigh">—</span>
                    </div>
                    <div class="today-stat">
                        <span class="today-stat-label">今日最低</span>
                        <span class="today-stat-val neutral" id="todayLow">—</span>
                    </div>
                    <div class="today-stat">
                        <span class="today-stat-label">昨日收盘</span>
                        <span class="today-stat-val neutral" id="yesterdayClose">—</span>
                    </div>
                </div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </div>

            <div class="card chart-card">
                <div class="card-title">价格走势</div>
                <div class="chart-toolbar">
                    <button type="button" class="tf-btn active" data-candle-unit="second" data-interval="1" data-fetch-hours="6" data-visible-hours="0.25">时分</button>
                    <button type="button" class="tf-btn" data-candle-unit="minute" data-interval="1" data-fetch-hours="72" data-visible-hours="6">1分</button>
                    <button type="button" class="tf-btn" data-candle-unit="minute" data-interval="5" data-fetch-hours="168" data-visible-hours="10">5分钟</button>
                    <button type="button" class="tf-btn" data-candle-unit="minute" data-interval="60" data-fetch-hours="720" data-visible-hours="168">1小时</button>
                </div>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                    <div id="chartLoading" class="loading chart-loading-overlay">
                        <div class="loading-spinner"></div>
                        <span>等待数据...</span>
                    </div>
                </div>
            </div>

            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-title">期权洞察（CME VOI + 实时金价）</div>
                <div class="insight-contract-tag" id="insightContractLine">合约：—</div>
                <div class="insight-updated-line" id="insightUpdatedLine" style="display:none;font-size:0.68rem;color:var(--text-muted);margin-top:0.25rem"></div>
                <div id="insightLoading" class="loading" style="display:none;margin-top:0.5rem"><span>加载洞察...</span></div>
                <div id="insightError" style="display:none;color:var(--price-down);font-size:0.8rem;margin-top:0.5rem"></div>
                <div class="insight-metrics" id="insightMetrics"></div>
            </div>

            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-title">宏观与持仓（merge 数据）</div>
                <div id="mergeMeta" style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.75rem"></div>
                <div class="macro-grid">
                    <div>
                        <div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.35rem">黄金 ETF 日增减 <span style="color:var(--text-muted)">（红增 · 绿减）</span></div>
                        <div class="macro-chart-wrap"><canvas id="chartEtfGold"></canvas></div>
                    </div>
                    <div>
                        <div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.35rem">COMEX 黄金库存（吨）</div>
                        <div class="macro-chart-wrap"><canvas id="chartComexGold"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
          </div>
          <div class="ai-panel">
            <div class="card">
                <div class="ai-panel-header">
                    <div class="card-title" style="margin-bottom:0">AI 分析记录</div>
                    <span class="ai-panel-count" id="aiLogCount">0 条</span>
                </div>
                <div class="ai-log-list" id="aiLogList">
                    <div class="ai-empty" id="aiLogEmpty">
                        <div class="ai-empty-icon">🤖</div>
                        <div>暂无分析记录</div>
                        <div style="margin-top:0.25rem;font-size:0.7rem">当告警触发时，AI 将自动分析</div>
                    </div>
                </div>
            </div>
          </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script>
        // Global state
        let priceChart = null;
        let eventSource = null;
        let headerTodayUp = null;
        let chartCandleUnit = 'second';
        let chartCandleInterval = 1;
        let chartFetchHours = 6;
        let chartVisibleHours = 0.25;
        let priceViewportUserSet = false;
        let chartPollTimer = null;
        let macroCharts = { etfGold: null, comexGold: null };

        const CANDLE_RED = '#ff4757';
        const CANDLE_GREEN = '#00d084';
        const CANDLE_FLAT = '#6a6a7a';

        const macroTooltipPlugin = {
            backgroundColor: '#1a1a24',
            titleColor: '#8888a0',
            bodyColor: '#f0f0f5',
            bodyFont: {
                family: 'JetBrains Mono',
                size: 13,
                weight: '600'
            },
            borderColor: '#2a2a3a',
            borderWidth: 1,
            padding: 12,
            displayColors: false
        };

        // DOM Elements
        const priceValueEl = document.getElementById('priceValue');
        const changeDayRowEl = document.getElementById('changeDayRow');
        const changeDayAmountEl = document.getElementById('changeDayAmount');
        const changeDayPercentEl = document.getElementById('changeDayPercent');
        const change1hRowEl = document.getElementById('change1hRow');
        const change1hAmountEl = document.getElementById('change1hAmount');
        const change1hPercentEl = document.getElementById('change1hPercent');
        const updateTimeEl = document.getElementById('updateTime');
        const connectionStatusEl = document.getElementById('connectionStatus');
        const errorMessageEl = document.getElementById('errorMessage');
        const chartLoadingEl = document.getElementById('chartLoading');
        const todayOpenEl = document.getElementById('todayOpen');
        const todayHighEl = document.getElementById('todayHigh');
        const todayLowEl = document.getElementById('todayLow');
        const yesterdayCloseEl = document.getElementById('yesterdayClose');

        // Helper Functions
        function formatPrice(price) {
            return price.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        const priceExtremaLabelsPlugin = {
            id: 'priceExtremaLabels',
            afterDatasetsDraw: function (chart) {
                if (!chart.canvas || chart.canvas.id !== 'priceChart') {
                    return;
                }
                const ds = chart.data.datasets[0];
                if (!ds || !ds.data || ds.data.length === 0) {
                    return;
                }
                const xScale = chart.scales.x;
                const yScale = chart.scales.y;
                if (!xScale || !yScale) {
                    return;
                }
                const xMin = xScale.min;
                const xMax = xScale.max;
                const isLine = chart.config.type === 'line';
                let bestH = -Infinity;
                let bestL = Infinity;
                let highPt = null;
                let lowPt = null;
                for (let i = 0; i < ds.data.length; i++) {
                    const p = ds.data[i];
                    const tx = p && p.x;
                    if (tx == null || !Number.isFinite(tx) || tx < xMin || tx > xMax) {
                        continue;
                    }
                    if (isLine) {
                        const y = p.y;
                        if (!Number.isFinite(y)) {
                            continue;
                        }
                        if (y > bestH) {
                            bestH = y;
                            highPt = p;
                        }
                        if (y < bestL) {
                            bestL = y;
                            lowPt = p;
                        }
                    } else {
                        const h = p.h;
                        const l = p.l;
                        if (!Number.isFinite(h) || !Number.isFinite(l)) {
                            continue;
                        }
                        if (h > bestH) {
                            bestH = h;
                            highPt = p;
                        }
                        if (l < bestL) {
                            bestL = l;
                            lowPt = p;
                        }
                    }
                }
                if (highPt == null || lowPt == null || !Number.isFinite(bestH) || !Number.isFinite(bestL)) {
                    return;
                }

                const ctx = chart.ctx;
                const area = chart.chartArea;
                const fmt = function (v) {
                    return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                };
                function drawPriceTip(text, px, py, color, placeAbove) {
                    ctx.textAlign = 'center';
                    ctx.font = '600 10px "JetBrains Mono", "Consolas", monospace';
                    let yText = placeAbove ? py - 6 : py + 6;
                    if (placeAbove) {
                        ctx.textBaseline = 'bottom';
                        if (yText < area.top + 11) {
                            yText = area.top + 11;
                        }
                    } else {
                        ctx.textBaseline = 'top';
                        if (yText > area.bottom - 4) {
                            yText = area.bottom - 14;
                        }
                    }
                    ctx.strokeStyle = 'rgba(10, 10, 15, 0.92)';
                    ctx.lineWidth = 3;
                    ctx.lineJoin = 'round';
                    ctx.miterLimit = 2;
                    ctx.strokeText(text, px, yText);
                    ctx.fillStyle = color;
                    ctx.fillText(text, px, yText);
                }

                let pxH = xScale.getPixelForValue(highPt.x);
                let pyH = yScale.getPixelForValue(isLine ? highPt.y : highPt.h);
                let pxL = xScale.getPixelForValue(lowPt.x);
                let pyL = yScale.getPixelForValue(isLine ? lowPt.y : lowPt.l);
                if (Math.abs(pxH - pxL) < 28 && Math.abs(pyH - pyL) < 20) {
                    pxL += 40;
                }

                ctx.save();
                drawPriceTip(fmt(bestH), pxH, pyH, CANDLE_RED, true);
                drawPriceTip(fmt(bestL), pxL, pyL, CANDLE_GREEN, false);
                ctx.restore();
            }
        };
        Chart.register(priceExtremaLabelsPlugin);

        function formatChange(change) {
            const sign = change >= 0 ? '+' : '';
            return sign + change.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function formatPercent(percent) {
            const sign = percent >= 0 ? '+' : '';
            return sign + percent.toFixed(2) + '%';
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        }

        function candleTimeAxisUnit() {
            if (chartCandleUnit === 'second') return 'second';
            if (chartCandleInterval >= 60) return 'day';
            return 'hour';
        }

        /** 秒级走势由 SSE 实时推点；轮询仅做统计与周期性全量校正 */
        const CHART_POLL_MS = 30000;
        const SECOND_CHART_RESYNC_EVERY = 4;
        let chartSecondResyncPhase = 0;

        function candlesToFinancialPoints(candles) {
            return candles.map(function (c) {
                const x = new Date(c.t).getTime();
                return { x: x, o: c.open, h: c.high, l: c.low, c: c.close };
            });
        }

        function candlesToLinePoints(candles) {
            return candles.map(function (c) {
                return { x: new Date(c.t).getTime(), y: c.close };
            });
        }

        function applyDefaultPriceViewport(ohlc) {
            if (!priceChart || !ohlc || ohlc.length === 0) return;
            const last = ohlc[ohlc.length - 1].x;
            const first = ohlc[0].x;
            const visibleMs = chartVisibleHours * 3600 * 1000;
            const min = Math.max(first, last - visibleMs);
            priceChart.options.scales.x.min = min;
            priceChart.options.scales.x.max = last;
        }

        function applyHeaderPriceColor() {
            if (headerTodayUp === null) {
                priceValueEl.className = 'price-value neutral';
                return;
            }
            priceValueEl.className = 'price-value ' + (headerTodayUp ? 'up' : 'down');
        }

        function updatePriceDisplay(price, timestamp) {
            const priceNum = parseFloat(price);
            priceValueEl.innerHTML = formatPrice(priceNum) + '<span class="price-currency">USD</span>';
            applyHeaderPriceColor();
            updateTimeEl.textContent = formatTime(timestamp);
        }

        function setChangeRow(rowEl, amountEl, pctEl, change, pct, hasData) {
            if (!hasData) {
                amountEl.textContent = '—';
                pctEl.textContent = '—';
                rowEl.className = 'price-change-row neutral';
                return;
            }
            const up = change >= 0;
            amountEl.textContent = formatChange(change);
            pctEl.textContent = '(' + formatPercent(pct) + ')';
            rowEl.className = 'price-change-row ' + (up ? 'up' : 'down');
        }

        function todayStatTone(val, base) {
            if (val == null || !Number.isFinite(val) || base == null || !Number.isFinite(base) || base === 0) {
                return 'neutral';
            }
            const d = val - base;
            if (d > 0) {
                return 'up';
            }
            if (d < 0) {
                return 'down';
            }
            return 'neutral';
        }

        function setTodayOhlcDisplay(today) {
            const dash = '—';
            const base = today.yesterdayClose;
            const yc = today.yesterdayClose;
            if (yc != null && Number.isFinite(yc) && yc > 0) {
                yesterdayCloseEl.textContent = '$' + formatPrice(yc);
            } else {
                yesterdayCloseEl.textContent = dash;
            }
            yesterdayCloseEl.className = 'today-stat-val neutral';

            const o = today.open;
            todayOpenEl.textContent =
                o != null && Number.isFinite(o) && o > 0 ? '$' + formatPrice(o) : dash;
            todayOpenEl.className = 'today-stat-val ' + todayStatTone(o, base);

            const hi = today.high;
            todayHighEl.textContent = hi != null && Number.isFinite(hi) ? '$' + formatPrice(hi) : dash;
            todayHighEl.className = 'today-stat-val ' + todayStatTone(hi, base);

            const lo = today.low;
            todayLowEl.textContent = lo != null && Number.isFinite(lo) ? '$' + formatPrice(lo) : dash;
            todayLowEl.className = 'today-stat-val ' + todayStatTone(lo, base);
        }

        async function refreshPriceAnalytics() {
            try {
                const res = await fetch('/api/analytics');
                if (!res.ok) return;
                const j = await res.json();
                const today = j.today || {};
                const h1 = j['1h'] || {};
                setChangeRow(
                    changeDayRowEl,
                    changeDayAmountEl,
                    changeDayPercentEl,
                    today.change ?? 0,
                    today.changePercent ?? 0,
                    today.hasBaseline === true
                );
                setChangeRow(
                    change1hRowEl,
                    change1hAmountEl,
                    change1hPercentEl,
                    h1.change ?? 0,
                    h1.changePercent ?? 0,
                    h1.hasBaseline === true
                );
                if (today.hasBaseline === true) {
                    headerTodayUp = (today.change ?? 0) >= 0;
                } else {
                    headerTodayUp = null;
                }
                setTodayOhlcDisplay(today);
                applyHeaderPriceColor();
            } catch (e) {
                console.error('涨幅统计加载失败', e);
            }
        }

        function applyCandlesToChart(candles) {
            if (!candles || candles.length === 0) return;
            const wantLine = chartCandleUnit === 'second';
            if (priceChart) {
                const isLine = priceChart.config.type === 'line';
                if (wantLine !== isLine) {
                    priceChart.destroy();
                    priceChart = null;
                    priceViewportUserSet = false;
                }
            }
            if (!priceChart) {
                initPriceChart();
            }
            const series = wantLine ? candlesToLinePoints(candles) : candlesToFinancialPoints(candles);
            priceChart.data.datasets[0].data = series;
            priceChart.options.scales.x.time.unit = candleTimeAxisUnit();
            const zx = priceChart.options.plugins && priceChart.options.plugins.zoom && priceChart.options.plugins.zoom.limits && priceChart.options.plugins.zoom.limits.x;
            if (zx) {
                zx.minRange = chartCandleUnit === 'second' ? 30 * 1000 : 10 * 60 * 1000;
            }
            if (!priceViewportUserSet) {
                applyDefaultPriceViewport(series);
            }
            priceChart.update('none');
            chartLoadingEl.style.display = 'none';
        }

        function applySecondTickToLineChart(price, timestampIso) {
            if (chartCandleUnit !== 'second' || !priceChart || priceChart.config.type !== 'line') {
                return;
            }
            const y = typeof price === 'number' ? price : parseFloat(price);
            if (!Number.isFinite(y)) {
                return;
            }
            const t = new Date(timestampIso).getTime();
            if (Number.isNaN(t)) {
                return;
            }
            const bucketMs = Math.floor(t / 1000) * 1000;
            const data = priceChart.data.datasets[0].data;
            const last = data.length > 0 ? data[data.length - 1] : null;
            if (last && last.x === bucketMs) {
                last.y = y;
            } else {
                data.push({ x: bucketMs, y: y });
            }
            const cutoff = Date.now() - chartFetchHours * 3600 * 1000;
            while (data.length > 0 && data[0].x < cutoff) {
                data.shift();
            }
            priceChart.options.scales.x.time.unit = candleTimeAxisUnit();
            const zx = priceChart.options.plugins && priceChart.options.plugins.zoom && priceChart.options.plugins.zoom.limits && priceChart.options.plugins.zoom.limits.x;
            if (zx) {
                zx.minRange = 30 * 1000;
            }
            if (!priceViewportUserSet) {
                applyDefaultPriceViewport(data);
            }
            priceChart.update('none');
            chartLoadingEl.style.display = 'none';
        }

        async function loadCandles() {
            if (!priceChart) return;
            try {
                let url = '/api/history/candles?interval=' + chartCandleInterval + '&hours=' + chartFetchHours;
                if (chartCandleUnit === 'second') {
                    url += '&unit=second';
                }
                const res = await fetch(url);
                const json = await res.json();
                if (json.candles && json.candles.length > 0) {
                    applyCandlesToChart(json.candles);
                    const last = json.candles[json.candles.length - 1];
                    updatePriceDisplay(last.close, last.t);
                }
            } catch (e) {
                console.error('K线加载失败', e);
            }
        }

        function startChartPolling() {
            if (chartPollTimer) {
                clearInterval(chartPollTimer);
            }
            chartSecondResyncPhase = 0;
            chartPollTimer = setInterval(function () {
                if (chartCandleUnit === 'second') {
                    refreshPriceAnalytics();
                    chartSecondResyncPhase += 1;
                    if (chartSecondResyncPhase >= SECOND_CHART_RESYNC_EVERY) {
                        chartSecondResyncPhase = 0;
                        loadCandles();
                    }
                } else {
                    chartSecondResyncPhase = 0;
                    loadCandles();
                    refreshPriceAnalytics();
                }
            }, CHART_POLL_MS);
        }

        function showConnectionStatus(status) {
            let html = '';
            switch(status) {
                case 'connected':
                    html = '<span class="pulse connected"></span>已连接';
                    connectionStatusEl.className = 'status-value connected';
                    break;
                case 'disconnected':
                    html = '<span class="pulse disconnected"></span>已断开';
                    connectionStatusEl.className = 'status-value disconnected';
                    break;
                case 'connecting':
                default:
                    html = '<span class="pulse connecting"></span>连接中...';
                    connectionStatusEl.className = 'status-value connecting';
                    break;
            }
            connectionStatusEl.innerHTML = html;
        }

        function showError(message) {
            errorMessageEl.textContent = message;
            errorMessageEl.style.display = 'block';
        }

        function hideError() {
            errorMessageEl.style.display = 'none';
        }

        function makePriceChartOptions(isLine) {
            const tooltipCallbacks = isLine
                ? {
                    title: function (items) {
                        if (!items || !items.length) return '';
                        const r = items[0].raw;
                        if (!r || r.x == null) return '';
                        return new Date(r.x).toLocaleString('zh-CN', { hour12: false });
                    },
                    label: function (context) {
                        const y = context.parsed.y;
                        if (y == null || Number.isNaN(y)) return '';
                        return '价格 $' + formatPrice(y);
                    }
                }
                : {
                    title: function (items) {
                        if (!items || !items.length) return '';
                        const r = items[0].raw;
                        if (!r || r.x == null) return '';
                        return new Date(r.x).toLocaleString('zh-CN', { hour12: false });
                    },
                    label: function (context) {
                        const r = context.raw;
                        if (!r) return '';
                        return [
                            '开 $' + formatPrice(r.o),
                            '高 $' + formatPrice(r.h),
                            '低 $' + formatPrice(r.l),
                            '收 $' + formatPrice(r.c)
                        ];
                    }
                };
            return {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        top: 18,
                        bottom: 20,
                        left: 0,
                        right: 2
                    }
                },
                animation: {
                    duration: 0
                },
                interaction: {
                    intersect: false,
                    mode: 'index'
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: '#1a1a24',
                        titleColor: '#8888a0',
                        bodyColor: '#f0f0f5',
                        bodyFont: {
                            family: 'JetBrains Mono',
                            size: 13,
                            weight: '600'
                        },
                        borderColor: '#2a2a3a',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: false,
                        callbacks: tooltipCallbacks
                    },
                    zoom: {
                        limits: {
                            x: {
                                min: 'original',
                                max: 'original',
                                minRange: isLine ? 30 * 1000 : 10 * 60 * 1000
                            }
                        },
                        pan: {
                            enabled: true,
                            mode: 'x',
                            onPanComplete: function () {
                                priceViewportUserSet = true;
                            }
                        },
                        zoom: {
                            wheel: {
                                enabled: true
                            },
                            pinch: {
                                enabled: true
                            },
                            mode: 'x',
                            onZoomComplete: function () {
                                priceViewportUserSet = true;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        display: true,
                        grid: {
                            display: false
                        },
                        time: {
                            unit: 'hour'
                        },
                        ticks: {
                            color: '#555566',
                            font: {
                                family: 'JetBrains Mono',
                                size: 10
                            },
                            maxRotation: 0,
                            maxTicksLimit: 10
                        }
                    },
                    y: {
                        display: true,
                        position: 'right',
                        grace: '14%',
                        grid: {
                            color: '#2a2a3a',
                            drawBorder: false
                        },
                        ticks: {
                            color: '#555566',
                            font: {
                                family: 'JetBrains Mono',
                                size: 11
                            },
                            callback: function (value) {
                                return '$' + value.toFixed(0);
                            }
                        }
                    }
                }
            };
        }

        function initPriceChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const isLine = chartCandleUnit === 'second';
            priceChart = new Chart(ctx, {
                type: isLine ? 'line' : 'candlestick',
                data: {
                    datasets: isLine
                        ? [{
                            label: 'XAUUSD',
                            data: [],
                            borderColor: '#7dd3c0',
                            backgroundColor: 'rgba(125, 211, 192, 0.12)',
                            borderWidth: 1.5,
                            fill: true,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            tension: 0
                        }]
                        : [{
                            label: 'XAUUSD',
                            data: [],
                            borderColors: {
                                up: CANDLE_RED,
                                down: CANDLE_GREEN,
                                unchanged: CANDLE_FLAT
                            },
                            backgroundColors: {
                                up: CANDLE_RED,
                                down: CANDLE_GREEN,
                                unchanged: CANDLE_FLAT
                            }
                        }]
                },
                options: makePriceChartOptions(isLine)
            });
        }

        function connectSSE() {
            showConnectionStatus('connecting');
            hideError();
            
            eventSource = new EventSource('/events');
            
            eventSource.onopen = function() {
                showConnectionStatus('connected');
                console.log('SSE connected');
                refreshPriceAnalytics();
            };
            
            eventSource.addEventListener('connected', function(event) {
                const data = JSON.parse(event.data);
                console.log('Connected with client ID:', data.clientId);
            });
            
            eventSource.addEventListener('price', function(event) {
                const data = JSON.parse(event.data);
                const price = data.price;
                const timestamp = data.timestamp;
                updatePriceDisplay(price, timestamp);
                applySecondTickToLineChart(price, timestamp);
            });
            
            eventSource.onerror = function(err) {
                console.error('SSE error:', err);
                showConnectionStatus('disconnected');
                showError('连接中断，正在重试...');
                
                // Close and reconnect
                eventSource.close();
                setTimeout(connectSSE, 3000);
            };
        }

        function wireTimeframeButtons() {
            document.querySelectorAll('.tf-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    chartCandleUnit = btn.getAttribute('data-candle-unit') === 'second' ? 'second' : 'minute';
                    chartCandleInterval = Number(btn.getAttribute('data-interval')) || 1;
                    chartFetchHours = Number(btn.getAttribute('data-fetch-hours')) || 72;
                    chartVisibleHours = Number(btn.getAttribute('data-visible-hours')) || 6;
                    priceViewportUserSet = false;
                    chartLoadingEl.style.display = 'flex';
                    startChartPolling();
                    loadCandles();
                });
            });
        }

        function fmtNum(n, d) {
            if (n == null || Number.isNaN(n)) return '—';
            return Number(n).toFixed(d);
        }

        function formatInsightUpdatedAt(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return String(iso);
            return d.toLocaleString('zh-CN', { hour12: false });
        }

        async function loadInsightMetrics() {
            const box = document.getElementById('insightMetrics');
            const errEl = document.getElementById('insightError');
            const loadEl = document.getElementById('insightLoading');
            const lineEl = document.getElementById('insightContractLine');
            const updatedLineEl = document.getElementById('insightUpdatedLine');
            errEl.style.display = 'none';
            updatedLineEl.style.display = 'none';
            updatedLineEl.textContent = '';
            loadEl.style.display = 'block';
            try {
                const res = await fetch('/api/insight/metrics');
                const j = await res.json();
                loadEl.style.display = 'none';
                if (!res.ok) {
                    errEl.textContent = j.error || j.hint || '洞察不可用';
                    errEl.style.display = 'block';
                    box.innerHTML = '';
                    return;
                }
                const meta = j.meta || {};
                const c = j.contract;
                const pc = meta.primary_contract;
                const ltd = (c && c.ltd_ymd) || meta.primary_contract_ltd;
                const contractLabel = (c && c.contract) || pc || '—';
                lineEl.textContent = '合约：' + contractLabel + (ltd ? ' · LTD ' + ltd : '');
                const upd = meta.insight_data_updated_at;
                if (upd) {
                    let uText = '数据更新：' + formatInsightUpdatedAt(upd);
                    if (meta.insight_voi_trade_date) {
                        uText += ' · VOI 交易日 ' + meta.insight_voi_trade_date;
                    }
                    if (meta.insight_stale_fallback) {
                        uText += ' · 已回退至历史快照';
                    }
                    updatedLineEl.textContent = uText;
                    updatedLineEl.style.display = 'block';
                }
                if (!c) {
                    errEl.textContent = '暂无可用的期权指标（已尝试当前数据与历史快照）';
                    errEl.style.display = 'block';
                    box.innerHTML = '';
                    return;
                }
                if (c.chart_error) {
                    errEl.textContent = c.chart_error;
                    errEl.style.display = 'block';
                    box.innerHTML = '';
                    return;
                }
                const d = c.daily || {};
                const rows = [
                    ['最大痛苦', fmtNum(c.max_pain, 0)],
                    ['现货偏离%', fmtNum(c.price_deviation_pct, 2)],
                    ['ATM 行权价', fmtNum(c.atm_strike, 0)],
                    ['Delta 中性', fmtNum(c.delta_neutral_strike, 1)],
                    ['Gamma 加权', fmtNum(c.gamma_weighted_strike, 1)],
                    ['净 Delta 零', fmtNum(c.net_delta_zero_strike, 0)],
                    ['总 OI', d.total_oi != null ? String(d.total_oi) : '—'],
                    ['PCR', d.pcr != null ? fmtNum(d.pcr, 3) : '—'],
                ];
                box.innerHTML = rows.map(function(kv) {
                    return '<div class="insight-metric"><div class="k">' + kv[0] + '</div><div class="v">' + kv[1] + '</div></div>';
                }).join('');
            } catch (e) {
                loadEl.style.display = 'none';
                errEl.textContent = '洞察请求失败';
                errEl.style.display = 'block';
            }
        }

        function makeLineChart(canvasId, labels, values, borderColor, fillColor) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '',
                        data: values,
                        borderColor: borderColor,
                        backgroundColor: fillColor || 'rgba(212, 175, 55, 0.12)',
                        borderWidth: 1.5,
                        fill: true,
                        tension: 0.25,
                        pointRadius: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 0 },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: Object.assign({}, macroTooltipPlugin, {
                            callbacks: {
                                label: function (context) {
                                    const v = context.parsed.y;
                                    if (v == null || Number.isNaN(v)) return '';
                                    return ' ' + fmtNum(v, 2);
                                }
                            }
                        })
                    },
                    scales: {
                        x: { ticks: { color: '#555566', maxRotation: 0, maxTicksLimit: 6 } },
                        y: { ticks: { color: '#555566' }, grid: { color: '#2a2a3a' } }
                    }
                }
            });
        }

        /** ETF 当日相对前一日的库存变化：柱状图，红增绿减（与 A 股配色习惯一致） */
        function makeEtfDailyChangeBarChart(canvasId, labels, dailyChanges) {
            const redUp = '#ff4757';
            const greenDown = '#00d084';
            const colors = dailyChanges.map(function (v) {
                const n = Number(v);
                if (!Number.isFinite(n)) return '#555566';
                if (n > 0) return redUp;
                if (n < 0) return greenDown;
                return '#6a6a7a';
            });
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '日增减',
                        data: dailyChanges,
                        backgroundColor: colors,
                        borderColor: colors,
                        borderWidth: 0,
                        borderRadius: 3,
                        maxBarThickness: 14,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 0 },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: Object.assign({}, macroTooltipPlugin, {
                            callbacks: {
                                label: function (context) {
                                    const v = context.parsed.y;
                                    if (v == null || Number.isNaN(v)) return '';
                                    return ' ' + fmtNum(v, 2);
                                }
                            }
                        })
                    },
                    scales: {
                        x: {
                            ticks: { color: '#555566', maxRotation: 0, maxTicksLimit: 8 },
                            grid: { display: false },
                        },
                        y: {
                            ticks: { color: '#555566' },
                            grid: { color: '#2a2a3a' },
                        },
                    },
                },
            });
        }

        async function loadMergeSeries() {
            const metaEl = document.getElementById('mergeMeta');
            try {
                const res = await fetch('/api/insight/merge-series?kinds=etf_gold,comex_gold&limit=365');
                const bundle = await res.json();
                if (bundle.merge_state) {
                    metaEl.textContent = '快照：' + (bundle.merge_state.last_snapshot_id || '—') +
                        ' · 更新 ' + (bundle.merge_state.updated_at || '—');
                }
                const items = bundle.items || [];
                const byKind = {};
                items.forEach(function(it) { byKind[it.kind] = it; });

                function one(kind, chartKey, canvasId, seriesIdx, borderColor, fillColor) {
                    const it = byKind[kind];
                    if (!it || !it.available || !it.labels || it.labels.length === 0) return;
                    const s = it.series[seriesIdx];
                    if (!s) return;
                    if (macroCharts[chartKey]) {
                        macroCharts[chartKey].destroy();
                        macroCharts[chartKey] = null;
                    }
                    macroCharts[chartKey] = makeLineChart(canvasId, it.labels, s.data, borderColor, fillColor);
                }

                function oneEtfBar(kind, chartKey, canvasId) {
                    const it = byKind[kind];
                    if (!it || !it.available || !it.labels || it.labels.length === 0) return;
                    const ch = it.series[1];
                    if (!ch || !ch.data || ch.data.length === 0) return;
                    if (macroCharts[chartKey]) {
                        macroCharts[chartKey].destroy();
                        macroCharts[chartKey] = null;
                    }
                    macroCharts[chartKey] = makeEtfDailyChangeBarChart(canvasId, it.labels, ch.data);
                }

                oneEtfBar('etf_gold', 'etfGold', 'chartEtfGold');
                one('comex_gold', 'comexGold', 'chartComexGold', 0, 'rgb(212, 175, 55)', 'rgba(212, 175, 55, 0.12)');
            } catch (e) {
                metaEl.textContent = 'merge 数据加载失败';
            }
        }

        // ── AI Analysis Logs Panel ──────────────────────────────
        let aiMaxId = 0;
        const aiLogListEl = document.getElementById('aiLogList');
        const aiLogEmptyEl = document.getElementById('aiLogEmpty');
        const aiLogCountEl = document.getElementById('aiLogCount');
        const AI_POLL_INTERVAL = 15000;

        function formatDateTime(ts) {
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        function renderLogItem(log, isNew) {
            const div = document.createElement('div');
            div.className = 'ai-log-item' + (isNew ? ' new-item' : '');
            div.dataset.id = log.id;

            const isPeriodic = log.alert_type === 'periodic_analysis';
            const typeTag = isPeriodic
                ? '<span class="ai-log-type-tag periodic">定时</span>'
                : '<span class="ai-log-type-tag alert">告警</span>';

            let html = '<div class="ai-log-meta">';
            html += '<span class="ai-log-time">' + formatDateTime(log.timestamp) + '</span>';
            html += typeTag;
            html += '<span class="ai-log-level ' + log.alert_level + '">' + log.alert_level + '</span>';
            if (log.ai_confidence) {
                html += '<span class="ai-log-confidence"><span class="confidence-dot ' + log.ai_confidence + '"></span>' + log.ai_confidence + '</span>';
            }
            html += '</div>';

            html += '<div class="ai-log-title">' + escapeHtml(log.alert_title) + '</div>';
            html += '<div class="ai-log-price">$' + Number(log.price).toFixed(2) + '</div>';

            if (log.ai_analysis) {
                html += '<div class="ai-log-analysis">' + escapeHtml(log.ai_analysis) + '</div>';
            }
            if (log.ai_suggestion) {
                html += '<div class="ai-log-suggestion">' + escapeHtml(log.ai_suggestion) + '</div>';
            }

            div.innerHTML = html;
            return div;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function updateLogCount() {
            const items = aiLogListEl.querySelectorAll('.ai-log-item');
            aiLogCountEl.textContent = items.length + ' 条';
        }

        async function loadAnalysisLogs() {
            try {
                const res = await fetch('/api/analysis-logs?limit=20');
                const data = await res.json();
                if (data.logs && data.logs.length > 0) {
                    aiLogEmptyEl.style.display = 'none';
                    data.logs.forEach(log => {
                        aiLogListEl.appendChild(renderLogItem(log, false));
                        if (log.id > aiMaxId) aiMaxId = log.id;
                    });
                    updateLogCount();
                }
            } catch (e) {
                console.error('加载分析记录失败:', e);
            }
        }

        async function pollAnalysisLogs() {
            try {
                const res = await fetch('/api/analysis-logs/latest?since_id=' + aiMaxId);
                const data = await res.json();
                if (data.logs && data.logs.length > 0) {
                    aiLogEmptyEl.style.display = 'none';
                    data.logs.forEach(log => {
                        if (log.id > aiMaxId) {
                            aiMaxId = log.id;
                            const el = renderLogItem(log, true);
                            aiLogListEl.insertBefore(el, aiLogListEl.firstChild === aiLogEmptyEl ? null : aiLogListEl.firstChild);
                        }
                    });
                    updateLogCount();
                }
            } catch (e) {
                console.error('轮询分析记录失败:', e);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initPriceChart();
            wireTimeframeButtons();
            loadCandles();
            refreshPriceAnalytics();
            startChartPolling();
            loadInsightMetrics();
            setInterval(loadInsightMetrics, 45000);
            loadMergeSeries();
            setInterval(loadMergeSeries, 600000);
            connectSSE();
            loadAnalysisLogs();
            setInterval(pollAnalysisLogs, AI_POLL_INTERVAL);
        });
    </script>
</body>
</html>
